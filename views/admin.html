<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 我的个人博客</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-main {
            padding-top: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 30px;
            position: relative;
            min-height: 60px;
        }

        .admin-header h2 {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            font-size: 1.8rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .admin-header .header-actions button.btn-edit {
            background-color: #007bff !important;
            color: #ffffff !important;
            border: none !important;
            padding: 10px 24px !important;
            border-radius: 30px !important;
            font-weight: 600 !important;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease !important;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            text-decoration: none;
        }

        .admin-header .header-actions button.btn-edit:hover {
            background-color: #0056b3 !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.4);
        }

        [data-theme="dark"] .admin-header .header-actions button.btn-edit {
            background-color: #007bff !important;
            color: #ffffff !important;
        }

        .admin-table-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            width: 100%;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .admin-table th, .admin-table td {
            padding: 15px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .admin-table th {
            background-color: var(--nav-bg);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .col-title { width: 35%; }
        .col-cate  { width: 12%; }
        .col-views { width: 8%; }
        .col-status { width: 8%; }
        .col-date  { width: 15%; }
        .col-action { width: 22%; }

        .status-badge {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
        }

        .admin-table button {
            border: none;
            padding: 6px 18px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            margin: 2px;
        }

        .btn-edit {
            background-color: #eef6ff;
            color: #007AFF;
        }
        .btn-edit:hover {
            background-color: #007AFF;
            color: white;
        }

        .btn-delete, .btn-delete-small {
            background-color: #fff2f2;
            color: #FF3B30;
        }
        .btn-delete:hover, .btn-delete-small:hover {
            background-color: #FF3B30;
            color: white;
        }

        /* 返回游客视图按钮 - 位于工具栏 */
        .btn-return-visitor {
            padding: 6px 15px;
            background-color: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-return-visitor:hover {
            background-color: #007AFF;
            color: white;
            border-color: #007AFF;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            max-width: 90%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        .modal-box h3 { margin-bottom: 20px; color: var(--text-primary); }
        .modal-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .modal-box .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .btn-primary {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
        }

        .admin-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo"><a href="/">MyBlog</a></div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <!-- 固定管理导航 -->
                <nav class="nav-links" id="nav-links">
                    <a href="#articles-section" id="nav-articles" class="active">文章管理</a>
                    <a href="#comments-section" id="nav-comments">评论管理</a>
                    <a href="/editor">发布文章</a>
                </nav>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色模式">
                    <svg id="moon-icon" viewBox="0 0 24 24" style="width:20px; height:20px;"><path fill="currentColor" d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" /></svg>
                    <svg id="sun-icon" viewBox="0 0 24 24" style="display: none; width:20px; height:20px;"><path fill="currentColor" d="M12 7a5 5 0 1 1 -4.992 5L7 12a5 5 0 0 1 5 -5zM2 13h2a1 1 0 0 0 0 -2H2a1 1 0 0 0 0 2zm18 0h2a1 1 0 0 0 0 -2h-2a1 1 0 0 0 0 2zM11 2v2a1 1 0 0 0 2 0V2a1 1 0 0 0 -2 0zm0 18v2a1 1 0 0 0 2 0v-2a1 1 0 0 0 -2 0zM5.99 4.58a1 1 0 0 0 -1.414 1.414l1.414 1.414a1 1 0 0 0 1.414 -1.414L5.99 4.58zm12.02 12.02a1 1 0 0 0 -1.414 1.414l1.414 1.414a1 1 0 0 0 1.414 -1.414l-1.414 -1.414zm-12.02 0l-1.414 1.414a1 1 0 0 0 1.414 1.414l1.414 -1.414a1 1 0 0 0 -1.414 -1.414zm14.14 -12.726a1 1 0 0 0 -1.414 -1.414l-1.414 1.414a1 1 0 0 0 1.414 1.414l1.414 -1.414z" /></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 登录模态框 -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>管理员登录</h3>
            <input type="text" id="login-username" placeholder="用户名">
            <input type="password" id="login-password" placeholder="密码">
            <p id="login-error" style="color:red;font-size:0.9rem;"></p>
            <div class="btn-row">
                <button class="btn-primary" onclick="doLogin()">登录</button>
                <button class="btn-secondary" onclick="window.location.href='/'">取消</button>
            </div>
        </div>
    </div>

    <!-- 修改凭据模态框 -->
    <div id="credential-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>修改管理员凭据</h3>
            <input type="text" id="new-username" placeholder="新用户名">
            <input type="password" id="new-password" placeholder="新密码">
            <p id="credential-error" style="color:red;font-size:0.9rem;"></p>
            <div class="btn-row">
                <button class="btn-primary" onclick="updateCredentials()">保存</button>
                <button class="btn-secondary" onclick="closeCredentialModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 管理内容主体（登录后才显示） -->
    <main class="container admin-main" id="admin-content" style="display:none;">
        <div class="admin-toolbar">
            <span style="margin-right:auto;color:var(--text-secondary);" id="welcome-msg"></span>
            <button class="btn-secondary" onclick="openCredentialModal()">修改凭据</button>
            <button class="btn-secondary" onclick="logout()">退出登录</button>
            <a href="/" class="btn-return-visitor"><i class="fas fa-home"></i> 返回游客视图</a>
        </div>

        <!-- 文章管理区块 -->
        <section id="articles-section">
            <div class="admin-header">
                <h2>文章管理</h2>
                <div class="header-actions">
                    <button class="action-btn btn-edit" onclick="window.location.href='/editor'">+ 发布新文章</button>
                </div>
            </div>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th class="col-title">标题</th>
                            <th class="col-cate">分类</th>
                            <th class="col-views">阅读量</th>
                            <th class="col-status">状态</th>
                            <th class="col-date">发布时间</th>
                            <th class="col-action">操作</th>
                        </tr>
                    </thead>
                    <tbody id="admin-article-list"></tbody>
                </table>
            </div>
        </section>

        <!-- 评论管理区块 -->
        <section id="comments-section" style="display:none; margin-top: 20px;">
            <div class="admin-header">
                <h2>评论管理</h2>
            </div>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">评论人</th>
                            <th style="width: 40%;">评论内容</th>
                            <th style="width: 20%;">所属文章</th>
                            <th style="width: 15%;">发布时间</th>
                            <th style="width: 10%;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="admin-comment-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/script.js"></script>
    <script>
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            // 根据 URL 锚点切换显示的表格
            handleHashChange();
            // 监听锚点变化
            window.addEventListener('hashchange', handleHashChange);
        });

        // ========== 表格显示切换逻辑 ==========
        function showSection(sectionId) {
            // 隐藏所有区块
            document.getElementById('articles-section').style.display = 'none';
            document.getElementById('comments-section').style.display = 'none';
            // 显示选中的区块
            document.getElementById(sectionId).style.display = 'block';
            // 更新导航 active 状态
            document.querySelectorAll('#nav-links a').forEach(a => a.classList.remove('active'));
            if (sectionId === 'articles-section') {
                document.getElementById('nav-articles').classList.add('active');
            } else if (sectionId === 'comments-section') {
                document.getElementById('nav-comments').classList.add('active');
            }
        }

        function handleHashChange() {
            const hash = window.location.hash; // 如 "#comments-section"
            if (hash === '#comments-section') {
                showSection('comments-section');
                if (document.getElementById('admin-content').style.display !== 'none') {
                    loadAdminComments(); // 切换到评论时加载数据
                }
            } else {
                showSection('articles-section');
                if (document.getElementById('admin-content').style.display !== 'none') {
                    loadAdminArticles(); // 切换到文章时加载数据
                }
            }
        }

        // 导航链接点击事件（防止页面滚动时触发锚点默认行为）
        document.querySelectorAll('#nav-links a[href^="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = link.getAttribute('href').substring(1);
                window.location.hash = targetId; // 更新 hash，触发 handleHashChange
            });
        });

        // ========== 登录状态检查 ==========
        async function checkLoginStatus() {
            try {
                const res = await fetch('/api/admin/check');
                const data = await res.json();
                if (data.loggedIn) {
                    document.getElementById('login-modal').style.display = 'none';
                    document.getElementById('admin-content').style.display = 'block';
                    document.getElementById('welcome-msg').textContent = `当前用户：${data.username}`;
                    // 根据当前显示的区块加载数据
                    if (document.getElementById('articles-section').style.display !== 'none') {
                        loadAdminArticles();
                    }
                    if (document.getElementById('comments-section').style.display !== 'none') {
                        loadAdminComments();
                    }
                } else {
                    document.getElementById('login-modal').style.display = 'flex';
                    document.getElementById('admin-content').style.display = 'none';
                }
            } catch (err) {
                console.error('状态检查失败', err);
            }
        }

        // ========== 登录 ==========
        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                return;
            }
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    errorEl.textContent = '';
                    checkLoginStatus();
                } else {
                    errorEl.textContent = data.message || '登录失败';
                }
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        }

        // ========== 登出 ==========
        async function logout() {
            await fetch('/api/admin/logout');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            checkLoginStatus();
        }

        // ========== 凭据修改 ==========
        function openCredentialModal() {
            document.getElementById('credential-modal').style.display = 'flex';
        }
        function closeCredentialModal() {
            document.getElementById('credential-modal').style.display = 'none';
            document.getElementById('credential-error').textContent = '';
        }
        async function updateCredentials() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const errorEl = document.getElementById('credential-error');
            if (!username || !password) {
                errorEl.textContent = '用户名和密码不能为空';
                return;
            }
            try {
                const res = await fetch('/api/admin/credentials', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    alert('管理员凭据已更新！下次登录请使用新的用户名和密码。');
                    closeCredentialModal();
                    document.getElementById('welcome-msg').textContent = `当前用户：${username}`;
                } else {
                    errorEl.textContent = data.message || '修改失败';
                }
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        }

        // ========== 文章列表 ==========
        async function loadAdminArticles() {
            const listContainer = document.getElementById('admin-article-list');
            try {
                const response = await fetch('/api/articles');
                const result = await response.json();
                if (result.success && result.data.length > 0) {
                    listContainer.innerHTML = result.data.map(article => `
                        <tr>
                            <td>${article.title}</td>
                            <td>${article.category || '默认'}</td>
                            <td>${article.view_count ?? 0}</td>
                            <td><span class="status-badge">已发布</span></td>
                            <td>${new Date(article.created_at || Date.now()).toLocaleDateString()}</td>
                            <td>
                                <button class="btn-edit" onclick="editArticle(${article.id})">编辑</button>
                                <button class="btn-delete" onclick="deleteArticle(${article.id})">删除</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    listContainer.innerHTML = '<tr><td colspan="6" style="text-align: center;">暂无文章</td></tr>';
                }
            } catch (error) {
                listContainer.innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">加载失败</td></tr>';
            }
        }

        function editArticle(id) {
            if (!id) { alert("无法获取文章 ID"); return; }
            window.location.href = `/editor?id=${id}`;
        }

        async function deleteArticle(id) {
            if (!confirm('警告：删除文章将同时删除其下所有评论！确定要继续吗？')) return;
            try {
                const response = await fetch(`/api/articles/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    alert('文章已删除！');
                    loadAdminArticles(); // 重新加载
                } else {
                    alert('删除失败：' + result.message);
                }
            } catch (error) {
                alert('无法连接到服务器，请检查网络');
            }
        }

        // ========== 评论列表 ==========
        async function loadAdminComments() {
            const tbody = document.getElementById('admin-comment-list');
            try {
                const response = await fetch('/api/comments/admin/all');
                const result = await response.json();
                if (result.success) {
                    tbody.innerHTML = result.data.map(comment => `
                        <tr>
                            <td>${comment.author_name}</td>
                            <td>${comment.content}</td>
                            <td><small>${comment.article_title || '（文章已删除）'}</small></td>
                            <td>${new Date(comment.created_at).toLocaleDateString()}</td>
                            <td>
                                <button class="btn-delete-small" onclick="deleteComment(${comment.id})">删除</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载评论失败:', error);
            }
        }

        async function deleteComment(id) {
            if (!confirm('确定要删除这条评论吗？此操作不可撤销。')) return;
            try {
                const response = await fetch(`/api/comments/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success === true || result.message === '评论已删除') {
                    alert('删除成功！');
                    loadAdminComments();
                } else {
                    alert('删除失败：' + (result.message || '未知原因'));
                }
            } catch (error) {
                alert('网络请求失败，请稍后再试');
            }
        }
    </script>
</body>
</html>
