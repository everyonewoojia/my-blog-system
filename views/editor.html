<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布文章 - 我的个人博客</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 编辑器页面特定样式补充 */
        .editor-header {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .input-title {
            flex: 1;
            padding: 10px;
            font-size: 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        .select-category {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        .editor-actions {
            margin-top: 20px;
            text-align: right;
            margin-bottom: 80px;
        }
        /* 单行布局容器 */
        .editor-top-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        /* 自定义下拉框基础样式 */
        /* 1. 顶端栏：强制比例 2:1:1 */
        .editor-top-bar {
            display: flex;
            width: 100%;
            height: 48px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            overflow: visible;
            position: relative;
            box-sizing: border-box;
        }

        /* 标题：强制占 50% */
        .input-title {
            flex: 0 0 50% !important; /* 不放大、不缩小、基准50% */
            width: 50%;
            min-width: 0; /* 关键：允许内容收缩，防止撑开 */
            border: none !important;
            border-right: 1px solid var(--border-color) !important;
            padding: 0 15px;
            box-sizing: border-box;
        }

        /* 分类与标签：各强制占 25% */
        .custom-select {
            flex: 0 0 25% !important; /* 不放大、不缩小、基准25% */
            width: 25%;
            min-width: 0; /* 关键：防止被长标签撑开 */
            position: relative;
            box-sizing: border-box;
            display: flex; /* 确保触发器占满 */
        }

        #category-select-wrapper {
            border-right: 1px solid var(--border-color);
        }

        /* 核心优化：处理标签过多不溢出 */
        .select-trigger {
            flex: 1;
            width: 100%;
            height: 100%;
            display: block; /* 改为 block 以便省略号生效 */
            line-height: 46px; /* 垂直居中 */
            padding: 0 15px;
            cursor: pointer;
            
            /* 终极截断三件套 */
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            
            box-sizing: border-box;
        }

        /* 2. 下拉栏左右边距与内部对齐 */
        .select-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 10px;
            right: 10px;
            width: auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            z-index: 1000;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* 3. 蓝勾显示逻辑修复 */
        .dropdown-item {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .item-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }

        /* 选中的颜色和勾号 */
        .dropdown-item.selected .item-text {
            color: #007AFF;
            font-weight: 500;
        }

        .dropdown-item.selected::after {
            content: '✓';
            color: #007AFF;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0; /* 确保勾号不被挤压 */
        }

        /* 4. 新增输入框防溢出 */
        .dropdown-add {
            padding: 8px;
            display: flex;
            gap: 5px;
            border-top: 1px solid var(--border-color);
        }

        .dropdown-add input {
            flex: 1;
            min-width: 0; /* 允许在小容器内缩得更小 */
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: transparent;
            color: var(--text-primary);
        }

        #publish-btn {
            background-color: #007AFF; /* 经典的蓝色 */
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 50px; /* 大圆角矩形 */
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }

        #publish-btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 122, 255, 0.3);
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <header>
        <div class="container nav-container">
            <div class="logo"><a href="/">MyBlog</a></div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <nav class="nav-links">
                    <a href="/">首页</a>
                    <a href="/admin/articles">管理</a>
                    <a href="/editor" class="active">发布文章</a>
                    <a href="/about">关于我</a>
                </nav>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色模式">
                    <svg id="moon-icon" viewBox="0 0 24 24"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" /></svg>
                    <svg id="sun-icon" viewBox="0 0 24 24" style="display: none;"><path d="M12 7a5 5 0 1 1 -4.992 5L7 12a5 5 0 0 1 5 -5zM2 13h2a1 1 0 0 0 0 -2H2a1 1 0 0 0 0 2zm18 0h2a1 1 0 0 0 0 -2h-2a1 1 0 0 0 0 2zM11 2v2a1 1 0 0 0 2 0V2a1 1 0 0 0 -2 0zm0 18v2a1 1 0 0 0 2 0v-2a1 1 0 0 0 -2 0zM5.99 4.58a1 1 0 0 0 -1.414 1.414l1.414 1.414a1 1 0 0 0 1.414 -1.414L5.99 4.58zm12.02 12.02a1 1 0 0 0 -1.414 1.414l1.414 1.414a1 1 0 0 0 1.414 -1.414l-1.414 -1.414zm-12.02 0l-1.414 1.414a1 1 0 0 0 1.414 1.414l1.414 -1.414a1 1 0 0 0 -1.414 -1.414zm14.14 -12.726a1 1 0 0 0 -1.414 -1.414l-1.414 1.414a1 1 0 0 0 1.414 1.414l1.414 -1.414z" /></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 编辑器主体 -->
    <main class="container" style="margin-top: 30px;">
        
        <!-- 标题、分类、标签输入区 -->
        <div class="editor-top-bar">
            <input type="text" id="post-title" class="input-title" placeholder="请输入文章标题...">

            <div class="custom-select" id="category-select-wrapper">
                <div class="select-trigger" id="category-trigger">选择分类</div>
                <div class="select-dropdown" id="category-dropdown">
                    <div class="dropdown-list" id="category-list">
                        </div>
                    <div class="dropdown-add">
                        <input type="text" id="new-category-input" placeholder="新增分类...">
                        <button type="button" id="add-category-btn">+</button>
                    </div>
                </div>
            </div>

            <div class="custom-select" id="tag-select-wrapper">
                <div class="select-trigger" id="tag-trigger">选择标签</div>
                <div class="select-dropdown" id="tag-dropdown">
                    <div class="dropdown-list" id="tag-list">
                        </div>
                    <div class="dropdown-add">
                        <input type="text" id="new-tag-input" placeholder="新增标签...">
                        <button type="button" id="add-tag-btn">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="editor-container">
            <!-- 左侧编辑区 -->
            <div class="editor-panel">
                <div class="panel-header">Markdown 编辑</div>
                <textarea id="markdown-input" placeholder="在此输入 Markdown 内容..."></textarea>
            </div>

            <!-- 右侧预览区 -->
            <div class="preview-panel">
                <div class="panel-header">实时预览</div>
                <div id="preview-output"></div>
            </div>
        </div>
        
        <div class="editor-actions">
            <button id="publish-btn" class="publish-btn">发布文章</button>
            <a href="/admin/articles" style="margin-left: 10px; color: var(--text-secondary);">取消</a>
        </div>
    </main>

    <!-- 底部版权 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/script.js"></script>
    <script>
    /**
     * 个人博客编辑器逻辑模块
     * 功能：支持 Markdown 预览、主题切换、分类/标签管理、新建/编辑文章
     */

    // --- 1. 全局状态管理 ---
    let currentArticleId = new URLSearchParams(window.location.search).get('id');
    let categories = ['技术', '生活', '杂谈']; // 默认值
    let tags = [];
    let selectedCategory = '';
    let selectedTags = [];

    /**
     * 配置 marked 引擎
     * 允许回车换行、启用 GitHub 风格语法
     */
    marked.setOptions({
        breaks: true,      // 核心配置：允许回车换行
        gfm: true,         // 启用 GitHub 风格的 Markdown
        headerIds: false   // 防止标题 ID 冲突（可选）
    });

    // --- 2. 核心初始化入口 ---
    document.addEventListener('DOMContentLoaded', async () => {
        await loadMetadata(); // 加载分类和标签元数据
        
        if (currentArticleId) {
            await enterEditMode(currentArticleId); // 进入编辑模式
        } else {
            enterCreateMode(); // 进入新建模式
        }

        bindGlobalEvents(); // 统一绑定事件
    });

    /**
     * 3. 进入编辑模式
     * @param {string} id 文章ID
     */
    async function enterEditMode(id) {
        const submitBtn = document.getElementById('publish-btn');
        submitBtn.textContent = '保存修改';
        document.title = '编辑文章 - 管理后台';

        try {
            const res = await fetch(`/api/articles/${id}`);
            const result = await res.json();
            if (result.success) {
                const article = result.data;
                // 填充数据
                document.getElementById('post-title').value = article.title;
                document.getElementById('markdown-input').value = article.content;
                
                // 回显分类与标签
                selectedCategory = article.category || '';
                selectedTags = article.tags ? article.tags.split(',').map(t => t.trim()) : [];
                
                renderOptions('category');
                renderOptions('tag');
                updatePreview();
            }
        } catch (err) {
            console.error('加载文章失败:', err);
        }
    }

    /**
     * 3. 进入新建模式
     */
    function enterCreateMode() {
        const input = document.getElementById('markdown-input');
        input.value = "# 欢迎使用 Markdown 编辑器\n\n在这里输入内容...";
        renderOptions('category');
        renderOptions('tag');
        updatePreview();
    }

    /**
     * 4. 渲染选项列表
     * @param {string} type 'category' 或 'tag'
     */
    function updatePreview() {
        const input = document.getElementById('markdown-input');
        const output = document.getElementById('preview-output');
        
        if (!input || !output) {
            console.warn("未找到编辑器或预览容器 ID");
            return;
        }

        const content = input.value;

        // 优先使用外部 marked 库
        if (typeof marked !== 'undefined') {
            output.innerHTML = marked.parse(content);
        } else {
            // 兜底方案：如果 marked 没加载成功，先显示原始文本或简单的换行处理
            output.innerHTML = content.replace(/\n/g, '<br>');
            console.error("marked 库未加载，请检查 HTML 中是否引入了 <script src='...marked.min.js'>");
        }
    }

    /**
     * 5. 绑定全局事件处理函数
     */
    async function handleSave() {
        const title = document.getElementById('post-title').value.trim();
        const content = document.getElementById('markdown-input').value.trim();

        if (!title || !content) {
            alert('标题和内容不能为空');
            return;
        }

        const articleData = {
            title: title,
            content: content,
            category: selectedCategory,
            tags: selectedTags.join(','),
            excerpt: content.substring(0, 150).replace(/[#*`]/g, '')
        };

        const url = currentArticleId ? `/api/articles/${currentArticleId}` : '/api/articles';
        const method = currentArticleId ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(articleData)
            });
            const result = await res.json();
            if (result.success) {
                alert(currentArticleId ? '更新成功！' : '发布成功！');
                window.location.href = '/admin/articles';
            } else {
                alert('操作失败: ' + result.message);
            }
        } catch (error) {
            console.error('请求出错:', error);
            alert('网络请求失败');
        }
    }

    /**
     * 6. 绑定事件处理函数（下拉栏切换）
     */
    window.renderOptions = function(type) {
        const list = document.getElementById(`${type}-list`);
        const trigger = document.getElementById(`${type}-trigger`);
        const data = type === 'category' ? categories : tags;
        const selected = type === 'category' ? [selectedCategory] : selectedTags;

        if (!list || !trigger) return;

        list.innerHTML = data.map(item => {
            const isSelected = selected.includes(item);
            return `
                <div class="dropdown-item ${isSelected ? 'selected' : ''}" 
                    onclick="toggleSelect('${type}', '${item}', event)">
                    <span class="item-text">${item}</span>
                </div>
            `;
        }).join('');

        // 更新触发器显示文字
        if (type === 'category') {
            trigger.innerText = selectedCategory || '选择分类';
        } else {
            trigger.innerText = selectedTags.length > 0 ? selectedTags.join(', ') : '选择标签';
        }
    };

    window.toggleSelect = (type, value, event) => {
        event.stopPropagation();
        if (type === 'category') {
            selectedCategory = (selectedCategory === value) ? '' : value;
        } else {
            const index = selectedTags.indexOf(value);
            if (index > -1) selectedTags.splice(index, 1);
            else selectedTags.push(value);
        }
        renderOptions(type);
    };

    /**
     * 7. 绑定全局事件处理函数
     */
    function bindGlobalEvents() {
        // 1. 监听输入即时预览
        document.getElementById('markdown-input').addEventListener('input', updatePreview);

        // 2. 提交按钮
        document.getElementById('publish-btn').addEventListener('click', handleSave);

        // 3. 下拉菜单逻辑 (优化：防止由于点击内部导致下拉框消失)
        document.addEventListener('click', (e) => {
            ['category', 'tag'].forEach(type => {
                const wrapper = document.getElementById(`${type}-select-wrapper`);
                const dropdown = document.getElementById(`${type}-dropdown`);
                if (!wrapper || !dropdown) return;

                if (wrapper.contains(e.target)) {
                    // 如果点的是触发器，切换显示
                    if (e.target.classList.contains('select-trigger')) {
                        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
                    }
                    // 如果点的是下拉框内部（比如输入框、+号按钮），保持显示，不执行任何操作
                } else {
                    // 只有点到 wrapper 外部才隐藏
                    dropdown.style.display = 'none';
                }
            });
        });

        // 4. 新增分类按钮 (修正路径并增强稳定性)
        const addCatBtn = document.getElementById('add-category-btn');
        if (addCatBtn) {
            addCatBtn.onclick = async (e) => {
                e.stopPropagation(); // 阻止冒泡，防止被 document 的点击事件干扰
                const input = document.getElementById('new-category-input');
                const val = input.value.trim();

                if (val) {
                    try {
                        // 注意这里的路径：必须包含 /articles/
                        const response = await fetch('/api/articles/categories', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: val })
                        });
                        const result = await response.json();

                        if (result.success) {
                            if (!categories.includes(val)) {
                                categories.push(val);
                            }
                            input.value = '';
                            renderOptions('category');
                            alert('分类已永久保存');
                        } else {
                            alert('保存失败：' + result.message);
                        }
                    } catch (error) {
                        console.error('网络错误:', error);
                    }
                }
            };
        }

        // 5. 新增标签按钮 (同理修正路径)
        const addTagBtn = document.getElementById('add-tag-btn');
        if (addTagBtn) {
            addTagBtn.onclick = async (e) => {
                e.stopPropagation();
                const input = document.getElementById('new-tag-input');
                const val = input.value.trim();
                if (val) {
                    try {
                        const response = await fetch('/api/articles/tags', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: val })
                        });
                        const result = await response.json();
                        if (result.success) {
                            if (!tags.includes(val)) {
                                tags.push(val);
                            }
                            input.value = '';
                            renderOptions('tag');
                            alert('标签已永久保存');
                        } else {
                            alert('保存失败：' + result.message);
                        }
                    } catch (error) {
                        console.error('网络错误:', error);
                    }
                }
            };
        }
    }

    /**
     * 8. 加载元数据
     */
    async function loadMetadata() {
        try {
            const res = await fetch('/api/articles/metadata');
            const result = await res.json();
            if (result.success) {
                categories = result.data.categories || categories;
                tags = result.data.tags || [];
            }
        } catch (e) { console.warn("无法加载元数据，使用默认值"); }
    }
    </script>
</body>
</html>
