<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新文章 - 我的个人博客</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">MyBlog</a></div>
            <div style="display: flex; align-items: center;">
                <nav class="nav-links">
                   <a href="/">首页</a>
                   <a href="#">归档</a>
                   <a href="/">发布文章</a>
                   <a href="#">关于我</a>
                </nav>
            
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色模式">
                    <svg id="moon-icon" viewBox="0 0 24 24">
                       <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" />
                    </svg>
                    <svg id="sun-icon" viewBox="0 0 24 24" style="display: none;">
                       <path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin: 20px 0;">
            <input type="text" id="post-title-input" class="form-control" placeholder="请输入文章标题..." style="font-size: 1.5rem; padding: 15px;">
        </div>

        <div class="editor-container">
            <div class="editor-panel">
                <div class="panel-header">Markdown 编辑</div>
                <textarea id="markdown-input" placeholder="在此输入 Markdown 内容..."></textarea>
            </div>

            <div class="preview-panel">
                <div class="panel-header">实时预览</div>
                <div id="preview-output"></div>
            </div>
        </div>
        
        <div style="margin-top: 20px; text-align: right;">
            <button id="publish-btn" class="read-more-btn">发布文章</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 1. 处理文章发布逻辑
        document.getElementById('publish-btn').addEventListener('click', async () => {
            const content = document.getElementById('markdown-input').value;
            const title = document.getElementById('post-title-input').value;
            
            if (!title || !content) {
                alert('标题和内容不能为空！');
                return;
            }
            
            try {
                const res = await fetch('/api/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        title: title, 
                        content: content, 
                        excerpt: content.substring(0, 50),
                        category: '默认分类'
                    })
                });
                
                const result = await res.json();
                if (result.success) {
                    alert('发布成功！');
                    window.location.href = '/'; // 成功后跳转到首页
                } else {
                    alert('发布失败：' + (result.message || '服务器错误'));
                }
            } catch (e) {
                console.error('网络请求失败:', e);
                alert('网络请求失败，请检查后端服务是否启动');
            }
        });

        // 2. 简单的实时预览逻辑 (可选，增强体验)
        document.getElementById('markdown-input').addEventListener('input', (e) => {
            document.getElementById('preview-output').innerText = e.target.value;
        });
    </script>
    
    <script src="/js/script.js"></script>
</body>
</html>
