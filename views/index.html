<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- 顶部导航 -->
    <header>
    <div class="container nav-container">
        <div class="logo"><a href="index.html">MyBlog</a></div>
        <div style="display: flex; align-items: center;">
            <nav class="nav-links">
                <a href="/">首页</a>
                <a href="#">归档</a>
                <a href="/editor">发布文章</a>
                <a href="#">关于我</a>
            </nav>
            
            <!-- 新增：深色模式切换按钮 -->
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色模式">
                <!-- 默认显示月亮图标 (表示当前是浅色，点击变深色) -->
                <svg id="moon-icon" viewBox="0 0 24 24">
                    <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" />
                </svg>
                <!-- 太阳图标 (默认隐藏) -->
                <svg id="sun-icon" viewBox="0 0 24 24" style="display: none;">
                    <path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/>
                </svg>
            </button>
        </div>
    </div>
</header>

    <!-- 主体内容 -->
    <main class="container main-layout">
        <!-- 左侧文章列表 -->
        <section id="article-list">
            <!-- JS 将在此处插入文章卡片 -->
        </section>

        <!-- 右侧侧边栏 -->
        <aside class="sidebar">
            <!-- 搜索框 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">搜索</h3>
                <div class="search-box">
                    <input type="text" placeholder="输入关键词...">
                </div>
            </div>

            <!-- 分类列表 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">分类</h3>
                <ul class="category-list">
                    <li><a href="#">前端技术 (12)</a></li>
                    <li><a href="#">后端开发 (5)</a></li>
                    <li><a href="#">生活随笔 (8)</a></li>
                    <li><a href="#">读书笔记 (3)</a></li>
                </ul>
            </div>

            <!-- 标签云 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">标签云</h3>
                <div class="tag-cloud">
                    <a href="#" class="tag">JavaScript</a>
                    <a href="#" class="tag">CSS</a>
                    <a href="#" class="tag">HTML</a>
                    <a href="#" class="tag">React</a>
                    <a href="#" class="tag">Node.js</a>
                    <a href="#" class="tag">Git</a>
                </div>
            </div>

            <!-- 近期文章 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">近期文章</h3>
                <ul class="recent-posts">
                    <li><a href="#">探索现代前端开发趋势</a></li>
                    <li><a href="#">CSS Grid 布局完全指南</a></li>
                    <li><a href="#">如何构建高性能的个人博客</a></li>
                </ul>
            </div>
        </aside>
    </main>

    <!-- 底部版权 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();       // 初始化深色模式
            loadArticles();    // 加载文章列表
        });

        // --- 1. 深色模式核心逻辑 ---
        function initTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            
            // 获取保存的主题设置
            const savedTheme = localStorage.getItem('theme') || 'light';
            
            // 应用初始主题
            applyTheme(savedTheme);

            // 监听点击事件
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.body.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            });

            function applyTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                if (theme === 'dark') {
                    moonIcon.style.display = 'none';
                    sunIcon.style.display = 'block';
                } else {
                    moonIcon.style.display = 'block';
                    sunIcon.style.display = 'none';
                }
            }
        }

        // --- 2. 文章加载逻辑 ---
        async function loadArticles() {
            const listContainer = document.getElementById('article-list');
            try {
                const url = keyword ? `/api/articles?keyword=${encodeURIComponent(keyword)}` : '/api/articles';
                const response = await fetch(url);
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    listContainer.innerHTML = result.data.map(article => `
                        <article class="article-card">
                            <h3 class="article-title">
                                <a href="/post?id=${article.id}">${article.title}</a>
                            </h3>
                            <div class="article-meta">
                                <span>📅 ${new Date(article.created_at).toLocaleDateString()}</span>
                                <span>🏷️ ${article.category || '默认'}</span>
                            </div>
                            <p class="article-excerpt">${article.content.substring(0, 100)}...</p>
                            <a href="/post?id=${article.id}" class="read-more">阅读更多 →</a>
                        </article>
                    `).join('');
                } else {
                    listContainer.innerHTML = '<p>暂无文章发布</p>';
                }
            } catch (error) {
                listContainer.innerHTML = '<p style="color:red;">文章加载失败，请稍后重试</p>';
            }
        }
    </script>
</body>
</html>
