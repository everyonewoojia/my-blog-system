<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
    /* 标签云样式 */
    .tag-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 0;
    }
    .tag-item {
        padding: 4px 12px;
        background: var(--bg-secondary);
        border-radius: 20px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        text-decoration: none;
        transition: all 0.3s;
    }
    .tag-item:hover {
        background: #007AFF;
        color: white;
    }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <header>
        <div class="container nav-container">
            <div class="logo"><a href="/">MyBlog</a></div>
            <div style="display: flex; align-items: center;">
                <nav class="nav-links">
                    <a href="/" class="active">首页</a>
                    <a href="/admin">文章管理</a>
                    <a href="/editor">发布文章</a>
                    <a href="/about">关于我</a>
                </nav>
                
                <!-- 新增：深色模式切换按钮 -->
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色模式">
                    <!-- 默认显示月亮图标 (表示当前是浅色，点击变深色) -->
                    <svg id="moon-icon" viewBox="0 0 24 24">
                        <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" />
                    </svg>
                    <!-- 太阳图标 (默认隐藏) -->
                    <svg id="sun-icon" viewBox="0 0 24 24" style="display: none;">
                        <path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="container main-layout">
        <!-- 左侧文章列表 -->
        <section id="article-list">
            <!-- JS 将在此处插入文章卡片 -->
        </section>

        <!-- 右侧侧边栏 -->
        <aside class="sidebar">
            <!-- 搜索框 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">搜索</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索文章...">
                </div>
            </div>

            <!-- 分类列表 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">分类</h3>
                <ul class="category-list"></ul>
            </div>

            <!-- 标签列表 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">标签云</h3>
                <ul class="tag-cloud" id="tag-cloud"></ul>
            </div>

            <!-- 近期文章 -->
            <div class="sidebar-widget">
                <h3 class="widget-title">近期文章</h3>
                <ul class="recent-posts"></ul>
            </div>

            
        </aside>
    </main>

    <!-- 底部版权 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();       
            loadArticles();    
            loadCategories(); 
            loadTagCloud();
            loadRecentPosts();
        });

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadArticles(this.value);
            }
        });

        // --- 1. 深色模式核心逻辑 ---
        function initTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            
            // 获取保存的主题设置
            const savedTheme = localStorage.getItem('theme') || 'light';
            
            // 应用初始主题
            applyTheme(savedTheme);

            // 监听点击事件
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.body.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            });

            function applyTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                if (theme === 'dark') {
                    moonIcon.style.display = 'none';
                    sunIcon.style.display = 'block';
                } else {
                    moonIcon.style.display = 'block';
                    sunIcon.style.display = 'none';
                }
            }
        }

        // --- 2. 文章加载逻辑 ---
        async function loadArticles(keyword = '', category = '', tag) {
            const listContainer = document.getElementById('article-list');
        try {
            // 构造 URL，确保空值不干扰
            const params = new URLSearchParams({ page: 1, limit: 10 });
            if (keyword) params.append('keyword', keyword);
            if (category) params.append('category', category);
            if (tag) params.append('tag', tag);

            const res = await fetch(`/api/articles?${params.toString()}`);
            const result = await res.json();
            
            if (result.success && result.data.length > 0) {
                listContainer.innerHTML = result.data.map(article => `
                    <article class="article-card">
                        <h3><a href="/post?id=${article.id}">${article.title}</a></h3>
                        <div class="article-meta">
                            <span>📅 ${new Date(article.created_at).toLocaleDateString()}</span>
                            <span>🏷️ ${article.category}</span>
                            ${article.tags ? `<span class="article-tags">🔍 ${article.tags}</span>` : ''}
                        </div>
                        <p>${article.excerpt || ''}</p>
                    </article>
                `).join('');
            } else {
                listContainer.innerHTML = '<p class="empty-msg">暂无匹配文章</p>';
            }
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        // --- 3. 加载并渲染分类侧边栏 ---
        async function loadCategories() {
            const categoryContainer = document.querySelector('.category-list');
            try {
                const response = await fetch('/api/articles/stats');
                const result = await response.json();
                
                if (result.success) {
                    // 渲染分类列表，点击时调用 loadArticles 并传入分类名
                    categoryContainer.innerHTML = result.data.map(item => `
                        <li>
                            <a href="javascript:void(0)" onclick="loadArticles('', '${item.category}')">
                                ${item.category} (${item.count})
                            </a>
                        </li>
                    `).join('');
                }
            } catch (error) {
                console.error('加载分类失败:', error);
            }
        }

        // --- 4. 近期文章加载逻辑 ---
        async function loadRecentPosts() {
            const recentContainer = document.querySelector('.recent-posts');
            if (!recentContainer) return;

            try {
                // 请求接口，限制只取 3 条最新的文章
                const response = await fetch('/api/articles?limit=3&page=1');
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    recentContainer.innerHTML = result.data.map(article => `
                        <li>
                            <a href="/post?id=${article.id}" title="${article.title}">
                                ${article.title}
                            </a>
                        </li>
                    `).join('');
                } else {
                    recentContainer.innerHTML = '<li>暂无最新文章</li>';
                }
            } catch (error) {
                console.error('加载近期文章失败:', error);
                recentContainer.innerHTML = '<li>加载失败</li>';
            }
        }

        // --- 5. 标签云加载逻辑 ---
        async function loadTagCloud() {
            const cloud = document.getElementById('tag-cloud');
            if (!cloud) return;
    
            try {
                const res = await fetch('/api/articles/tag-stats');
                const result = await res.json();
                if (result.success && result.data) {
                    // 渲染标签，并绑定点击事件调用 loadArticles
                    cloud.innerHTML = result.data.map(tag => `
                        <a href="javascript:void(0)" 
                        class="tag-item" 
                        onclick="loadArticles('', '', '${tag.name}')">
                            ${tag.name} (${tag.count})
                        </a>
                    `).join('');
                }
            } catch (err) {
                console.error('加载标签云失败:', err);
            }
        }

        // 页面加载时执行
        loadArticles(); 
    </script>
</body>
</html>
