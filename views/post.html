<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索现代前端开发趋势 - 我的个人博客</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- 顶部导航 -->
    <header>
        <div class="container nav-container">
            <div class="logo"><a href="/">MyBlog</a></div>
            <div style="display: flex; align-items: center;">
                <nav class="nav-links">
                    <a href="/">首页</a>
                    <a href="/archive">归档</a>
                    <a href="/admin">管理</a>
                    <a href="/editor">发布文章</a>
                    <a href="/about">关于我</a>
                </nav>
                
                <!-- 新增：深色模式切换按钮 -->
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色模式">
                    <svg id="moon-icon" viewBox="0 0 24 24" style="width:20px; height:20px;"><path fill="currentColor" d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" /></svg>
                    <svg id="sun-icon" viewBox="0 0 24 24" style="display: none; width:20px; height:20px;"><path fill="currentColor" d="M12 7a5 5 0 1 1 -4.992 5L7 12a5 5 0 0 1 5 -5zM2 13h2a1 1 0 0 0 0 -2H2a1 1 0 0 0 0 2zm18 0h2a1 1 0 0 0 0 -2h-2a1 1 0 0 0 0 2zM11 2v2a1 1 0 0 0 2 0V2a1 1 0 0 0 -2 0zm0 18v2a1 1 0 0 0 2 0v-2a1 1 0 0 0 -2 0zM5.99 4.58a1 1 0 0 0 -1.414 1.414l1.414 1.414a1 1 0 0 0 1.414 -1.414L5.99 4.58zm12.02 12.02a1 1 0 0 0 -1.414 1.414l1.414 1.414a1 1 0 0 0 1.414 -1.414l-1.414 -1.414zm-12.02 0l-1.414 1.414a1 1 0 0 0 1.414 1.414l1.414 -1.414a1 1 0 0 0 -1.414 -1.414zm14.14 -12.726a1 1 0 0 0 -1.414 -1.414l-1.414 1.414a1 1 0 0 0 1.414 1.414l1.414 -1.414z" /></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体内容：详情页通常不需要侧边栏，或者侧边栏可以简化，这里采用单列居中布局以提升阅读体验 -->
    <main class="container" style="max-width: 800px; margin-top: 40px; margin-bottom: 60px;">
        
        <!-- 文章头部 -->
        <article>
            <header class="post-header">
                <h1 class="post-title" id="article-title">加载中...</h1>
                <div class="post-meta">
                    <span id="post-date"><i class="far fa-calendar-alt"></i> --</span>
                    <span id="post-category"><i class="fas fa-folder"></i> --</span>
                    <span id="post-views"><i class="fas fa-eye"></i> -- 阅读</span>
                </div>
            </header>

            <!-- 文章正文 -->
            <div class="post-content" id="article-content">
                </div>
        </article>

        <!-- 评论区 -->
        <section class="comments-section">
            <h3 class="section-title">评论</h3>
            
            <!-- 评论列表 -->
            <div class="comment-list" id="comment-list">
                <p>正在加载评论...</p>
            </div>

            <!-- 发表评论表单 -->
            <div class="comment-form">
                <h3>发表评论</h3>
                <form id="comment-form">
                    <div class="form-group">
                        <input type="text" id="comment-name" class="form-control" placeholder="您的昵称" required>
                    </div>
                    <div class="form-group">
                        <textarea id="comment-content" class="form-control" placeholder="请输入您的评论..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">提交评论</button>
                </form>
            </div>
        </section>
    </main>

    <!-- 底部版权 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/script.js"></script>
    <script>
        /**
         * 配置 marked
         */
        marked.setOptions({
            breaks: true,      // 核心配置：允许回车换行
            gfm: true,         // 启用 GitHub 风格的 Markdown
            headerIds: false   // 防止标题 ID 冲突（可选）
        });

        // 页面特定的 JS：处理评论提交
        document.addEventListener('DOMContentLoaded', () => {
            // 获取 URL 中的文章 ID
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (!articleId) {
                alert('未找到文章 ID');
                window.location.href = '/';
                return;
            }

            // 2. 执行初始化流程
            loadArticleDetail(articleId);
            loadComments(articleId);
            setupCommentSubmission(articleId);
        });

        /**
         * 加载文章详情
         * @param {string} articleId 文章 ID
         */
        async function loadArticleDetail(id) {
            try {
                const response = await fetch(`/api/articles/${id}`);
                const result = await response.json();

                // 关键修复：根据你之前的后端逻辑，result 可能是 { success: true, data: { ... } }
                // 或者直接是 article 对象。这里做一个兼容性判断
                const article = result.data || result;

                if (!article || (!article.title && !article.content)) {
                    throw new Error('文章数据格式不正确');
                }

                // 1. 填充基础信息
                document.getElementById('article-title').textContent = article.title || '无标题';
                document.getElementById('post-date').innerHTML = `<i class="far fa-calendar-alt"></i> ${article.created_at ? new Date(article.created_at).toLocaleDateString() : '未知日期'}`;
                document.getElementById('post-category').innerHTML = `<i class="fas fa-folder"></i> ${article.category || '未分类'}`;
                // 显示阅读量（使用 eye 图标）
                document.getElementById('post-views').innerHTML = `<i class="fas fa-eye"></i> ${article.view_count ?? 0} 阅读`;
                
                // 2. 渲染正文（解决 marked 报错的核心位置）
                const contentContainer = document.getElementById('article-content');
                const rawContent = article.content || ''; // 如果 content 为空，强制转为空字符串

                if (typeof marked !== 'undefined' && rawContent) {
                    // 只有当 content 有内容时才调用解析
                    contentContainer.innerHTML = marked.parse(rawContent);
                } else {
                    // 如果内容为空或者没引库，直接显示原始内容或提示
                    contentContainer.textContent = rawContent || '该文章暂无内容';
                }

                document.title = `${article.title} - 我的个人博客`;

            } catch (err) {
                console.error('加载文章详情失败:', err);
                document.getElementById('article-title').textContent = '内容加载失败';
                document.getElementById('article-content').textContent = '无法获取文章内容，请检查后端 API 是否正常。';
            }
        }

        /**
         * 加载评论列表
         * @param {string} articleId 文章 ID
         */
        async function loadComments(id) {
            const commentList = document.getElementById('comment-list');
            try {
                const response = await fetch(`/api/comments/${id}`);
                const comments = await response.json();

                if (comments.length === 0) {
                    commentList.innerHTML = '<p>暂无评论，快来抢沙发吧！</p>';
                    return;
                }

                commentList.innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(c.author_name)}&background=random" class="comment-avatar">
                        <div class="comment-body">
                            <div class="comment-header">
                                <span class="comment-author">${c.author_name}</span>
                                <span class="comment-date">${new Date(c.created_at).toLocaleString()}</span>
                            </div>
                            <p class="comment-text">${c.content}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                commentList.innerHTML = '<p>评论加载失败。</p>';
            }
        }

        /**
         * 设置评论提交处理函数
         * @param {string} articleId 文章 ID
         */
        function setupCommentSubmission(id) {
            const form = document.getElementById('comment-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const nameInput = document.getElementById('comment-name');
                const contentInput = document.getElementById('comment-content');

                const payload = {
                    author_name: nameInput.value.trim(), // 对应你后端要求的变量名
                    content: contentInput.value.trim()
                };

                try {
                    const response = await fetch(`/api/comments/${id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        alert('评论发表成功！');
                        nameInput.value = '';
                        contentInput.value = '';
                        loadComments(id); // 刷新评论列表显示最新内容
                    } else {
                        throw new Error('提交失败');
                    }
                } catch (err) {
                    alert('服务器忙，请稍后再试');
                }
            });
        }
    </script>
</body>
</html>
