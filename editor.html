<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新文章 - 我的个人博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 顶部导航 -->
    <header>
        <div class="container nav-container">
            <div class="logo">MyBlog</div>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="#">归档</a>
                <a href="editor.html" style="color: var(--accent-color);">发布文章</a>
                <a href="#">关于我</a>
            </nav>
        </div>
    </header>

    <!-- 编辑器主体 -->
    <main class="container">
        <div class="editor-container">
            <!-- 左侧编辑区 -->
            <div class="editor-panel">
                <div class="panel-header">Markdown 编辑</div>
                <textarea id="markdown-input" placeholder="在此输入 Markdown 内容..."></textarea>
            </div>

            <!-- 右侧预览区 -->
            <div class="preview-panel">
                <div class="panel-header">实时预览</div>
                <div id="preview-output"></div>
            </div>
        </div>
        
        <div style="margin-top: 20px; text-align: right;">
            <button class="read-more-btn" onclick="alert('文章已保存（模拟）')">发布文章</button>
        </div>
    </main>

    <!-- 底部版权 -->
    <footer>
        <div class="container">
            <p>&copy; 2023 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
